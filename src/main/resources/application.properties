# Application Configuration
spring.application.name=spring-jwt-auth

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql

# JWT Configuration
jwt.secret=MySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS512Algorithm
jwt.expiration=3600000

# Logging Configuration
logging.level.com.example.auth=DEBUG
logging.level.org.springframework.security=DEBUG

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true


# Spring AI OpenAI Configuration
spring.ai.openai.base-url=http://172.16.9.23:1234
spring.ai.openai.api-key=""
spring.ai.openai.embedding.options.model=text-embedding-nomic-embed-text-v2-moe
spring.ai.openai.embedding.options.dimensions=768
spring.ai.openai.chat.options.max-tokens=100

spring.ai.openai.chat.base-url=https://openrouter.ai/api
spring.ai.openai.chat.api-key=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
spring.ai.openai.chat.options.model=google/gemini-2.5-flash

# Spring AI PgVector Configuration
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.max-document-batch-size=10000
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.schema-validation=false
spring.ai.vectorstore.pgvector.table-name=vector_store

# GitHub → VectorStore ingestion (recursive file limits)
app.github-ingestion.max-depth=15
app.github-ingestion.max-files=500
app.github-ingestion.max-file-size-bytes=5000000